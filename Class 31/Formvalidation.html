<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    <h1>Form validation</h1>
    <form name = "myform" onsubmit = "validation()">
        Name <input type = name id = "myname">
        <br><br>
        <input type = submit>
    </form>  
    <script>
        function validation(){
            var x = document.forms["myform"]["myname"].value
            if (x == "")
        {
            alert(" The name must be filled out")
        }
        else{
            alert("The name is submitted")
        }
        }
    </script>
</body>
</html>
