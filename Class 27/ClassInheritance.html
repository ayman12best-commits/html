<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class inheritance</title>
</head>
<body>
    <h1>Class inheritance</h1>
    <div id = "res1"></div>
    <div id = "res2"></div>
    <script>
        class car{
            constructor(brand){
                this.brand = brand
            }
            disp1(){
                document.getElementById("res1").innerHTML = this.brand
            }
        }
        class model extends car{
            constructor(brand,model_name){
                super(brand)
                this.model_name = model_name
            }
            show(){
                this.disp1()
                document.getElementById("res2").innerHTML = this.model_name
            }
        }
        modell = new model('BMW','M4 comp')
        modell.show()
    </script>
</body>
</html>
