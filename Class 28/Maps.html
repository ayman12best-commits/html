<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array mapping</title>
</head>
<body>
    <h1>Array mapping</h1>
    <div id = "result"></div>
    <script>
        var a = [67,69,21,89,21,6767]
        function mul(a){
            return a * 10
        }
        var b = a.map(mul)
        document.getElementById("result").innerHTML = b
    </script>
</body>
</html>
