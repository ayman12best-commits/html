<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function or Click</title>
</head>
<body>
    <h1>Function</h1>
    <button onclick = "myfunction(5)">multiply</button>
    <div id = "result"></div>
    <script>
        function myfunction(x,y){
            if(y == undefined){
                y = 7
            }
            document.getElementById("result").innerHTML = "The result is " + (x * y)
        }
    </script>

</body>
</html>
