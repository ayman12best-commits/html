<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String conversion</title>
</head>
<body>
    <h1>String conversion</h1>
    <div id = "result"></div>
    <div id = "result1"></div>
    <script>
        var x = 90
        var y = 30
        document.getElementById("result").innerHTML = "the result is " + (x + y)
        document.getElementById("result1").innerHTML = "the answer is " + String(x) + String(y)
    </script>
</body>
</html>
