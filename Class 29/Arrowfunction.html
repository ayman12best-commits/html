<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow function</title>
</head>
<body>
    <h1>Arrow function</h1>
    <div id = "result"></div>
    <script>
        const add = (a,b) => a + b;
        document.getElementById("result").innerHTML = "The result is " + add(a,b)
    </script>
</body>
</html>
